
spec_version: 1
name: support-triage-env
type: space
runtime: fastapi
app: server.app:app
port: 7860
version: 1.0
description: Real-world customer support triage simulation
entry_point: env.environment:SupportEnv

observation_space:
  ticket_id: str
  message: str
  customer_tier: str
  timestamp: str

action_space:
  category: str
  priority: str
  assigned_team: str
  response: str

reward:
  type: dense

api:
  base_url: /
  endpoints:
    reset:
      method: POST
      path: /reset
    step:
      method: POST
      path: /step
    tasks:
      method: GET
      path: /tasks
    grader:
      method: POST
      path: /grader

tasks:
  - id: support_triage_easy
    task_id: easy
    name: easy
    difficulty: easy
    description: Classify the support ticket category correctly.
    grader: graders:grade_easy
    graders:
      - graders:grade_easy
    reward_range:
      - 0.0
      - 1.0
  - id: support_triage_medium
    task_id: medium
    name: medium
    difficulty: medium
    description: Classify the support ticket category and priority.
    grader: graders:grade_medium
    graders:
      - graders:grade_medium
    reward_range:
      - 0.0
      - 1.0
  - id: support_triage_hard
    task_id: hard
    name: hard
    difficulty: hard
    description: Predict category, priority, assigned team, and response quality.
    grader: graders:grade_hard
    graders:
      - graders:grade_hard
    reward_range:
      - 0.0
      - 1.0
